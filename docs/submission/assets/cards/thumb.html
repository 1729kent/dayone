<!doctype html><html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="style.css">
<style>
body{width:1280px;height:720px;justify-content:center}
.badge{position:absolute;top:34px;left:40px;font-family:var(--mono);font-size:15px;color:var(--sun);
  border:1px solid rgba(245,185,66,.5);border-radius:99px;padding:7px 18px;z-index:1;letter-spacing:.08em}
.score{position:absolute;right:48px;top:110px;text-align:center;z-index:1;background:var(--panel);
  border:1px solid var(--line);border-radius:18px;padding:18px 26px}
.score .n{font-family:var(--mono);font-weight:600;font-size:64px;color:var(--sun);line-height:1}
.score .l{font-size:14px;color:var(--ink2);margin-top:6px}
.pr{position:absolute;right:48px;bottom:100px;z-index:1;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:14px 20px;font-family:var(--mono);font-size:16px}
.pr b{color:var(--ok)}
</style></head>
<body>
  <div class="badge">DevOps × AI Agent Hackathon 2026</div>
  <div style="position:absolute;left:56px;top:120px;z-index:1;text-align:left">
    <div style="font-size:76px">☀️</div>
    <div class="big" style="font-size:100px;text-align:left;line-height:1.1">DayOne</div>
    <div class="big" style="font-size:46px;color:var(--sun);text-align:left;margin-top:16px">毎日が、入社初日。</div>
    <div class="sub" style="text-align:left;font-size:24px;margin-top:20px;color:var(--ink)">
      AIの新入社員が、腐ったREADMEを<br>検知して<span class="accent">自分で直す</span>
    </div>
  </div>
  <div class="score"><div class="n">15<span style="font-size:22px;color:var(--ink3)">/100</span></div>
    <div class="l">ドキュメント腐敗スコア</div></div>
  <div class="pr"><b>✔ Pull Request</b> を自動作成</div>
</body></html>
