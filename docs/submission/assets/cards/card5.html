<!doctype html><html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="style.css">
<style>
.row{display:flex;gap:20px;margin-top:36px;z-index:1}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 26px;text-align:center;min-width:250px}
.stat .n{font-family:var(--mono);font-weight:600;font-size:44px;line-height:1.1}
.stat .l{font-size:13.5px;color:var(--ink2);margin-top:8px;line-height:1.6}
.arrow{color:var(--ink3);font-size:30px}
</style></head>
<body>
  <div class="big" style="font-size:40px">人間がPRをマージすると、<br>翌朝のルーキーが<span class="accent">回復を確認</span>する</div>
  <div class="row">
    <div class="stat"><div class="n"><span style="color:var(--sun)">15</span> <span class="arrow">→</span> <span style="color:var(--ok)">0</span></div>
      <div class="l">腐敗スコア（本番データの実測）<br>マージ翌run で完全回復</div></div>
    <div class="stat"><div class="n" style="color:var(--ok)">誤検知 0</div>
      <div class="l">実在OSSでも検証済み<br><span class="mono" style="font-size:12px">chalk 0/100 · 84s ／ FastAPI 0/100 · 17s</span></div></div>
  </div>
  <div class="sub">Human-in-the-Loop — 判断と実行はAI、意思決定は人間。</div>
</body></html>
